[build]
  base = "Frontend"
  command = "npm run build"
  publish = "Frontend/dist"

# Proxy rules to forward frontend API requests to the Render backend
[[redirects]]
  from = "/api/auth/*"
  to = "https://YOUR-RENDER-BACKEND-URL.onrender.com/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://YOUR-RENDER-BACKEND-URL.onrender.com/api/:splat"
  status = 200
  force = true

# SPA client-side routing fallback (redirect all other paths to index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
